<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Winner Team</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <script src="js/firebase-init.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: #000; min-height: 100vh; display: flex; flex-direction: column; }

        .header {
            display: flex; align-items: center; gap: 14px;
            padding: 16px; background: #0f111a; color: white;
        }
        .back-btn { font-size: 18px; color: white; text-decoration: none; }
        .header-title { font-size: 16px; font-weight: 700; }

        .content {
            flex: 1; display: flex; flex-direction: column;
            align-items: stretch; justify-content: flex-start;
            padding: 0;
        }

        .winner-img-wrap {
            width: 100%;
        }
        .winner-img-wrap img {
            width: 100%; display: block;
        }

        .no-image {
            text-align: center; color: #999; font-size: 14px; padding: 40px 20px;
        }
        .no-image i { font-size: 48px; color: #ccc; margin-bottom: 12px; display: block; }
    </style>
</head>
<body>

    <header class="header">
        <a href="match_details.html" class="back-btn"><i class="fas fa-chevron-left"></i></a>
        <div class="header-title">Winner Team</div>
    </header>

    <div class="content">
        <div class="winner-img-wrap" id="imgWrap" style="display:none;">
            <img id="winnerImg" src="" alt="Winner Team">
        </div>
        <div class="no-image" id="noImageMsg">
            <i class="fas fa-image"></i>
            No winner team image uploaded yet.
        </div>
    </div>

    <script>
    comeDB.once('value', function(snapshot) {
        var d = snapshot.val() || {};
        if (d.winnerTeamImage) {
            var img = document.getElementById('winnerImg');
            var wrap = document.getElementById('imgWrap');
            var msg = document.getElementById('noImageMsg');
            img.src = d.winnerTeamImage;
            wrap.style.display = 'block';
            msg.style.display = 'none';
        }
    });
    </script>

</body>
</html>
