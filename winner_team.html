<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Winner Team</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <script src="js/firebase-init.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: #000; min-height: 100vh; display: flex; flex-direction: column; }

        .header {
            display: flex; align-items: center; gap: 14px;
            padding: 16px; background: #0f111a; color: white;
        }
        .back-btn { font-size: 18px; color: white; text-decoration: none; }
        .header-title { font-size: 16px; font-weight: 700; }

        .content {
            flex: 1; display: flex; flex-direction: column;
            align-items: stretch; justify-content: flex-start;
            padding: 0;
        }

        .winner-img-wrap {
            width: 100%;
        }
        .winner-img-wrap img {
            width: 100%; display: block;
        }

        .no-image {
            text-align: center; color: #999; font-size: 14px; padding: 40px 20px;
        }
        .no-image i { font-size: 48px; color: #ccc; margin-bottom: 12px; display: block; }

        /* --- NAVIGATION LOADING OVERLAY --- */
        #nav-loading-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            z-index: 99;
            background-image: url('assets/ipl-loading.png');
            background-size: cover;
            background-position: center top;
            background-repeat: no-repeat;
            align-items: center;
            justify-content: center;
        }
        #nav-loading-overlay.active { display: flex; }
        .rainbow-ring {
            width: 72px; height: 72px; border-radius: 50%;
            background: conic-gradient(from 0deg,#ff0000 0deg,#ff8c00 45deg,#ffe400 90deg,#00e000 135deg,#00cfff 180deg,#0055ff 225deg,#cc00ff 270deg,#ff0000 360deg);
            -webkit-mask: radial-gradient(circle, transparent 44%, black 45%);
            mask: radial-gradient(circle, transparent 44%, black 45%);
            animation: rainbow-spin 0.9s linear infinite;
        }
        @keyframes rainbow-spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <header class="header">
        <a href="match_details.html" class="back-btn"><i class="fas fa-chevron-left"></i></a>
        <div class="header-title">Winner Team</div>
    </header>

    <div class="content">
        <div class="winner-img-wrap" id="imgWrap" style="display:none;">
            <img id="winnerImg" src="" alt="Winner Team">
        </div>
        <div class="no-image" id="noImageMsg">
            <i class="fas fa-image"></i>
            No winner team image uploaded yet.
        </div>
    </div>

    <script>
    // Cache-first: render instantly from localStorage if image is already cached
    (function() {
        var cached = JSON.parse(localStorage.getItem('comeData') || '{}');
        if (cached.winnerTeamImage) {
            document.getElementById('winnerImg').src = cached.winnerTeamImage;
            document.getElementById('imgWrap').style.display = 'block';
            document.getElementById('noImageMsg').style.display = 'none';
            var ov = document.getElementById('nav-loading-overlay');
            if (ov) ov.classList.remove('active');
        }
    })();

    // Firebase fetch — updates image if fresher data exists
    comeDB.once('value', function(snapshot) {
        var ov = document.getElementById('nav-loading-overlay');
        if (ov) ov.classList.remove('active');
        var d = snapshot.val() || {};
        if (d.winnerTeamImage) {
            document.getElementById('winnerImg').src = d.winnerTeamImage;
            document.getElementById('imgWrap').style.display = 'block';
            document.getElementById('noImageMsg').style.display = 'none';
            showAppToast('Winner data loaded', 'success');
        }
    }, function(error) {
        var ov = document.getElementById('nav-loading-overlay');
        if (ov) ov.classList.remove('active');
        showAppToast('Could not load winner data \u2014 check connection', 'error');
    });

    // 5s fallback — hide overlay even if Firebase never responds
    setTimeout(function() {
        var ov = document.getElementById('nav-loading-overlay');
        if (ov) ov.classList.remove('active');
    }, 5000);
    </script>

    <!-- Navigation Loading Overlay -->
    <div id="nav-loading-overlay" class="active">
        <div class="rainbow-ring"></div>
    </div>

</body>
</html>
